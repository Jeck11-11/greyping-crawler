services:
  nuclei:
    build: .
    image: greyping/nuclei-passive:latest
    container_name: nuclei-passive
    restart: unless-stopped
    environment:
      # Path inside the container that will be used to read targets. Override if needed.
      - NUCLEI_TARGETS_FILE=/data/input/targets.txt
      # Extra CLI flags appended to the generated nuclei command.
      - NUCLEI_ADDITIONAL_ARGS=-stats
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc: 4096
    volumes:
      - ./data:/data
      - ./config/nuclei-config.yaml:/etc/nuclei/config.yaml:ro
    command: ["scan"]

  pd-tools-api:
    build: .
    image: greyping/nuclei-passive:latest
    container_name: pd-tools-api
    restart: unless-stopped
    environment:
      - NUCLEI_ADDITIONAL_ARGS=-stats
      - NUCLEI_API_HOST=0.0.0.0
      - NUCLEI_API_PORT=8080
      - PYTHONUNBUFFERED=1
    ports:
      - "8080:8080"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc: 4096
    volumes:
      - ./data:/data
      - ./config/nuclei-config.yaml:/etc/nuclei/config.yaml:ro
    command: ["api"]

  osint-api:
    build: .
    image: greyping/nuclei-passive:latest
    container_name: greyping-osint-api
    restart: unless-stopped
    env_file: .env
    environment:
      - OSINT_API_HOST=0.0.0.0
      - OSINT_API_PORT=8089
      - NUCLEI_API_URL=http://pd-tools-api:8080
      - PD_TOOLS_API_URL=http://pd-tools-api:8080
    ports:
      - "8089:8089"
    volumes:
      - ./data:/data
      - ./src:/usr/local/lib/osint_api/src:ro
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    command: ["osint-api"]
