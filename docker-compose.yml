version: "3.9"

services:
  api:
    build: .
    container_name: nuclei-api
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_BACKEND_URL=redis://redis:6379/0
      - RATE_LIMIT_COUNT=5
      - RATE_LIMIT_WINDOW=60
    ports:
      - "8081:8080"
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8080"]
    depends_on:
      - redis

  worker:
    build: .
    container_name: nuclei-worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_BACKEND_URL=redis://redis:6379/0
      - NUCLEI_IMAGE=projectdiscovery/nuclei
      - NUCLEI_TEMPLATES_PATH=/opt/nuclei-templates
      - XANO_URL=
      - XANO_API_KEY=
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/nuclei-templates:/opt/nuclei-templates:ro
    command: ["celery", "-A", "worker.celery_app", "worker", "--loglevel=info", "--concurrency=1"]
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: nuclei-redis
    ports:
      - "6379:6379"
