version: "3.9"

services:
  nuclei:
    build: .
    image: greyping/nuclei-passive:latest
    container_name: nuclei-passive
    restart: unless-stopped
    environment:
      # Path inside the container that will be used to read targets. Override if needed.
      - NUCLEI_TARGETS_FILE=/data/input/targets.txt
      # Extra CLI flags appended to the generated nuclei command.
      - NUCLEI_ADDITIONAL_ARGS=-stats
    volumes:
      - ./data:/data
      - ./config/nuclei-config.yaml:/etc/nuclei/config.yaml:ro
    command: ["scan"]

  nuclei-api:
    build: .
    image: greyping/nuclei-passive:latest
    container_name: nuclei-passive-api
    restart: unless-stopped
    environment:
      - NUCLEI_ADDITIONAL_ARGS=-stats
      - NUCLEI_API_HOST=0.0.0.0
      - NUCLEI_API_PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      - ./config/nuclei-config.yaml:/etc/nuclei/config.yaml:ro
    command: ["api"]

  osint-api:
    build: .
    image: greyping/nuclei-passive:latest
    container_name: greyping-osint-api
    restart: unless-stopped
    environment:
      - LOG_LEVEL=INFO
      # Set a Have I Been Pwned API key to enable breach lookups
      - HIBP_API_KEY=${HIBP_API_KEY:-}
      - OSINT_API_HOST=0.0.0.0
      - OSINT_API_PORT=8089
    ports:
      - "8089:8089"
    volumes:
      - ./data:/data
      - ./src:/usr/local/lib/osint_api/src:ro
    command: ["osint-api"]
