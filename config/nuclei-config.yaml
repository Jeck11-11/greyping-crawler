# Default configuration for passive nuclei scans.
# Template selection is handled by the -passive flag in the entrypoint,
# which automatically filters for passive-capable templates.

# Tune concurrency so that it fits within the 2 vCPU / 8 GB Hetzner instance.
bulk-size: 25
rate-limit: 150

# Enable passive mode by default and include helpful metadata.
passive: true
silent: true

# Store JSONL results so they can be post-processed easily.
jsonl: true
