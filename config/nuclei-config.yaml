# Default configuration for WAF-friendly nuclei scans.
# Uses active scanning with gentle rate limits suitable for production targets.
# For true passive mode (scanning pre-recorded HTTP response files), pass
# "passive": true in the /scan request body.

# Tune concurrency so that it fits within the 2 vCPU / 8 GB Hetzner instance.
bulk-size: 25
rate-limit: 150

silent: true

# Store JSONL results so they can be post-processed easily.
jsonl: true
